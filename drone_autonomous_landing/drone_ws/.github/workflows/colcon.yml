name: CI - colcon build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.0.27
        with:
          version: humble
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y python3-colcon-common-extensions python3-pip build-essential
      - name: Build workspace
        run: |
          colcon build --event-handlers console_direct+
